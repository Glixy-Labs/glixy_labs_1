name: release-aether

on:
  push:
    tags:
      - 'aether-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g. aether-v0.4.2)'
        required: true
        default: 'aether-v0.4.2'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Setup.exe
    runs-on: windows-latest
    defaults:
      run:
        working-directory: aether
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'aether/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --name "GlixyAether" `
            --onefile `
            --add-data "aether/web;aether/web" `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            -c `
            aether-launcher.py
          Get-ChildItem dist

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc installer.iss
          Get-ChildItem dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GlixyAether-Windows
          path: |
            aether/dist/GlixyAether.exe
            aether/dist/GlixyAether-Setup.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/aether-v') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.ref_name != '' && github.ref_name || inputs.version }}
          name: 'Glixy Aether ${{ github.ref_name != '' && github.ref_name || inputs.version }}'
          body: |
            ## Glixy Aether — Windows release

            **Download:** `GlixyAether-Setup.exe` below.

            ### Install steps
            1. Download `GlixyAether-Setup.exe`
            2. Run the installer (no admin needed, installs to `%LOCALAPPDATA%\Aether`)
            3. Launch from Start Menu or Desktop shortcut
            4. The dashboard opens automatically at <http://localhost:7777>

            ### What's included
            - Aether runtime (Python bundled — no separate Python install needed)
            - Local dashboard (chat, agents, memory, tools, runs)
            - CLI: `aether chat`, `aether memory`, `aether start`

            ### Configure a provider
            On first run, set your provider in **Settings** or via env var:
            ```powershell
            $env:OPENAI_API_KEY = "sk-..."
            $env:ANTHROPIC_API_KEY = "sk-ant-..."
            ```
            For free local LLMs, install [Ollama](https://ollama.com).

            ---
            Source: [`aether/`](https://github.com/Glixy-Labs/glixy_labs_1/tree/main/aether) — Apache 2.0.
          files: |
            aether/dist/GlixyAether-Setup.exe
            aether/dist/GlixyAether.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
